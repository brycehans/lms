name: CI

# Static verification gates. These need no database or secrets: typecheck and
# lint are pure, and `next build` (with Partial Prerendering) streams the
# Supabase-backed parts at runtime rather than connecting at build time, so it
# builds cleanly without NEXT_PUBLIC_SUPABASE_* env. DB/RLS/RPC correctness is
# out of scope here — that needs a Postgres service and is verified locally
# (see scripts/test-slot-lock-contention.sh).

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs the pnpm version from package.json's `packageManager` field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # next-env.d.ts (and .next/types) are generated by dev/build and gitignored,
      # so a fresh checkout lacks the *.webp / route module declarations that tsc
      # needs. `next typegen` regenerates them without a full build.
      - name: Generate Next types
        run: pnpm exec next typegen

      - name: Typecheck
        run: pnpm typecheck

      # eslint exits non-zero only on errors; the few React-Compiler warnings
      # (documented in eslint.config.mjs) don't fail the gate.
      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
